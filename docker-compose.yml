# Весь стек: Postgres (данные casino + метаданные Airflow), Redis,
# Airflow на CeleryExecutor (scheduler/webserver/worker), Metabase.
# Порядок старта держим на healthcheck'ах + depends_on: service_healthy.

# Зависимости airflow-сервисов: ждём postgres, redis и успешный init.
x-airflow-depends: &airflow-depends
  redis:
    condition: service_healthy
  postgres:
    condition: service_healthy
  airflow-init:
    condition: service_completed_successfully

x-airflow-common: &airflow-common
  build:
    context: ./docker/airflow
    args:
      AIRFLOW_VERSION: 2.9.3
      PYTHON_VERSION: "3.11"
  image: de-test/airflow-dbt:2.9.3
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: CeleryExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:${AIRFLOW_DB_PASSWORD:-airflow}@postgres:5432/airflow
    AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://airflow:${AIRFLOW_DB_PASSWORD:-airflow}@postgres:5432/airflow
    AIRFLOW__CELERY__BROKER_URL: redis://:@redis:6379/0
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY:-}
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__API__AUTH_BACKENDS: "airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session"
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: "true"
    # --- параметры подключения для тасков (load_csv, dbt, build_charts) ---
    DBT_HOST: postgres
    DBT_PORT: "5432"
    DBT_USER: ${POSTGRES_USER:-postgres}
    DBT_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    DBT_DBNAME: ${POSTGRES_DB:-casino}
    DBT_SCHEMA: analytics
    DBT_PROFILES_DIR: /opt/airflow/dbt
    DATA_DIR: /opt/airflow/data
    DBT_DIR: /opt/airflow/dbt
    REPORTS_DIR: /opt/airflow/reports
    DBT_BIN: /opt/dbt-venv/bin/dbt
  volumes:
    - ./dags:/opt/airflow/dags
    - ./dbt:/opt/airflow/dbt
    - ./viz:/opt/airflow/viz
    - ./data:/opt/airflow/data
    - ./reports:/opt/airflow/reports
    - airflow-logs:/opt/airflow/logs
  user: "${AIRFLOW_UID:-50000}:0"

services:
  # ------------------------------------------------------------------
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-casino}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./sql/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ------------------------------------------------------------------
  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username "${AIRFLOW_ADMIN_USER:-admin}" \
          --password "${AIRFLOW_ADMIN_PASSWORD:-admin}" \
          --firstname Admin --lastname User --role Admin \
          --email admin@example.com || true
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: on-failure

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "${AIRFLOW_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 15s
      timeout: 10s
      retries: 10
    depends_on: *airflow-depends
    restart: unless-stopped

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    depends_on: *airflow-depends
    restart: unless-stopped

  airflow-worker:
    <<: *airflow-common
    command: celery worker
    depends_on: *airflow-depends
    restart: unless-stopped

  # ------------------------------------------------------------------
  metabase:
    image: metabase/metabase:latest
    ports:
      - "${METABASE_PORT:-3000}:3000"
    environment:
      MB_DB_TYPE: h2
      MB_DB_FILE: /metabase-data/metabase.db
    volumes:
      - metabase-data:/metabase-data
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # Авто-настройка Metabase (админ + источник данных + дашборд).
  # Готовность Metabase скрипт ждёт сам, поэтому хватает service_started.
  metabase-init:
    image: python:3.11-slim
    entrypoint: ["python", "/provision/provision.py"]
    volumes:
      - ./metabase:/provision:ro
    environment:
      MB_URL: http://metabase:3000
      MB_ADMIN_EMAIL: ${MB_ADMIN_EMAIL:-admin@example.com}
      MB_ADMIN_PASSWORD: ${MB_ADMIN_PASSWORD:-Metabase123!}
      MB_PG_HOST: postgres
      MB_PG_PORT: "5432"
      MB_PG_DB: ${POSTGRES_DB:-casino}
      MB_PG_USER: ${POSTGRES_USER:-postgres}
      MB_PG_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    depends_on:
      metabase:
        condition: service_started
    restart: on-failure

volumes:
  postgres-data:
  airflow-logs:
  metabase-data:
